# Nixpacks — not used when railway.toml builder = dockerfile (kept for local reference)
# Node 20 static build + serve (Railway Nixpacks runtime often lacks npm — use Dockerfile instead)
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
